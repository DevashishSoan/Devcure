name: "DevCure Auto-Heal"
description: "Automatically diagnose and repair failing CI tests using DevCure's autonomous AI agent."
author: "DevCure"

branding:
  icon: "zap"
  color: "blue"

inputs:
  api-url:
    description: "Your DevCure backend URL (e.g. https://your-backend.onrender.com)"
    required: true
  api-key:
    description: "Your DevCure API key (from dashboard Settings)"
    required: true
  repo:
    description: "Repository to heal (defaults to current repo: owner/name)"
    required: false
    default: "${{ github.repository }}"
  branch:
    description: "Branch to heal (defaults to the triggering branch)"
    required: false
    default: "${{ github.ref_name }}"
  confidence-threshold:
    description: "Minimum confidence score (0-100) to auto-apply a patch. Below this, DevCure opens a PR for review."
    required: false
    default: "70"
  framework:
    description: "Test framework override (pytest, jest, vitest). Leave blank for auto-detect."
    required: false
    default: ""
  comment-on-pr:
    description: "Post a PR comment with the reasoning trace when a fix is found."
    required: false
    default: "true"

outputs:
  run-id:
    description: "The DevCure run ID for this healing cycle."
    value: ${{ steps.trigger.outputs.run-id }}
  status:
    description: "Final status: completed | escalated | failed"
    value: ${{ steps.poll.outputs.status }}
  pr-url:
    description: "GitHub PR URL if DevCure opened a fix PR."
    value: ${{ steps.poll.outputs.pr-url }}
  confidence:
    description: "Confidence score of the applied patch (0-100)."
    value: ${{ steps.poll.outputs.confidence }}

runs:
  using: "composite"
  steps:
    - name: "🧬 Trigger DevCure Healing Cycle"
      id: trigger
      shell: bash
      run: |
        RESPONSE=$(curl -s -X POST "${{ inputs.api-url }}/api/v1/runs/trigger" \
          -H "Authorization: Bearer ${{ inputs.api-key }}" \
          -H "Content-Type: application/json" \
          -d "{
            \"repo_url\": \"https://github.com/${{ inputs.repo }}\",
            \"branch\": \"${{ inputs.branch }}\",
            \"framework\": \"${{ inputs.framework }}\",
            \"confidence_threshold\": ${{ inputs.confidence-threshold }}
          }")

        echo "Response: $RESPONSE"
        RUN_ID=$(echo $RESPONSE | python3 -c "import sys, json; print(json.load(sys.stdin).get('run_id', ''))")

        if [ -z "$RUN_ID" ]; then
          echo "❌ Failed to trigger DevCure run. Check your api-url and api-key secrets."
          exit 1
        fi

        echo "✅ DevCure healing cycle started: $RUN_ID"
        echo "run-id=$RUN_ID" >> $GITHUB_OUTPUT

    - name: "⏳ Poll for healing result (max 5 minutes)"
      id: poll
      shell: bash
      run: |
        RUN_ID="${{ steps.trigger.outputs.run-id }}"
        MAX_ATTEMPTS=30
        SLEEP=10

        for i in $(seq 1 $MAX_ATTEMPTS); do
          echo "Polling attempt $i/$MAX_ATTEMPTS..."

          RESPONSE=$(curl -s "${{ inputs.api-url }}/api/v1/runs/$RUN_ID" \
            -H "Authorization: Bearer ${{ inputs.api-key }}")

          STATUS=$(echo $RESPONSE | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('status', 'unknown'))")
          PR_URL=$(echo $RESPONSE | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('pr_url') or '')")
          CONFIDENCE=$(echo $RESPONSE | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('confidence_score') or 0)")

          echo "Status: $STATUS | Confidence: $CONFIDENCE% | PR: $PR_URL"

          if [ "$STATUS" = "completed" ] || [ "$STATUS" = "escalated" ] || [ "$STATUS" = "failed" ]; then
            echo "status=$STATUS" >> $GITHUB_OUTPUT
            echo "pr-url=$PR_URL" >> $GITHUB_OUTPUT
            echo "confidence=$CONFIDENCE" >> $GITHUB_OUTPUT
            break
          fi

          sleep $SLEEP
        done

    - name: "📋 Post results summary"
      shell: bash
      run: |
        STATUS="${{ steps.poll.outputs.status }}"
        PR_URL="${{ steps.poll.outputs.pr-url }}"
        CONFIDENCE="${{ steps.poll.outputs.confidence }}"
        RUN_ID="${{ steps.trigger.outputs.run-id }}"

        if [ "$STATUS" = "completed" ]; then
          echo "✅ DevCure healed the failing tests! Confidence: ${CONFIDENCE}%"
          [ -n "$PR_URL" ] && echo "🔗 Fix PR: $PR_URL"
        elif [ "$STATUS" = "escalated" ]; then
          echo "⚠️ DevCure escalated for human review. Confidence was below threshold."
          [ -n "$PR_URL" ] && echo "🔗 Review the proposed fix: $PR_URL"
        else
          echo "❌ DevCure could not heal the tests. Manual investigation needed."
          echo "🔍 Full trace: ${{ inputs.api-url }}/api/v1/runs/$RUN_ID/trace"
          exit 1
        fi
