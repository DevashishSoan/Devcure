services:
  # Backend FastAPI Service
  - type: web
    name: devcure-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.1
      - key: PROJECT_NAME
        value: DevCure Autonomous QA Platform
      - key: API_V1_STR
        value: /api/v1
      - key: SANDBOX_TYPE
        value: docker
      - key: SANDBOX_BASE_PATH
        value: ./sandboxes
      - key: GEMINI_API_KEY
        sync: false
      - key: MINIMAX_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: VERCEL_URL
        sync: false

  # Frontend Next.js Service
  - type: web
    name: devcure-frontend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    staticPublishDir: frontend/out  # Only if using static export, otherwise omit
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: devcure-backend
          type: web
          property: host
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
